<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circleMask">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>
  <!-- No white background, just the clipped image -->
  <image xlink:href="logo.png" width="100" height="100" clip-path="url(#circleMask)" preserveAspectRatio="xMidYMid slice" />
</svg>
